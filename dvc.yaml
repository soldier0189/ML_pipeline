stages:

  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - experiments/anime_with_synopsis.csv
    outs:
      - data/raw/data.csv

  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data/raw/data.csv
    outs:
      - data/processed/data_processed.csv

  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/processed/data_processed.csv
    params:
      - tfidf.max_features
    outs:
      - artifacts/similarity.pkl
      - artifacts/tfidf.pkl
      - artifacts/data.pkl